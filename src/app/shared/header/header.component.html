<header class="sticky top-0 z-40 backdrop-blur-lg bg-white/80 dark:bg-surface-950/80 border-b border-surface-200 dark:border-surface-800 transition-colors duration-300 ease-out">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <div class="flex items-center gap-3">
        <div class="flex items-center justify-center w-9 h-9 rounded-xl bg-gradient-to-br from-primary-600 to-primary-800 shadow-lg shadow-primary-500/25">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
          </svg>
        </div>
        <div>
          <h1 class="text-lg font-bold text-surface-900 dark:text-white tracking-tight">
            {{ 'header.title' | transloco }}
          </h1>
          <p class="text-[10px] text-surface-400 font-medium uppercase tracking-widest -mt-0.5">
            {{ 'header.subtitle' | transloco }}
          </p>
        </div>
      </div>

      <div class="flex items-center gap-2">
        <div
          class="flex rounded-xl border border-surface-200 dark:border-surface-700 p-0.5 bg-surface-100/80 dark:bg-surface-800/80"
          role="group"
          [attr.aria-label]="'header.language' | transloco"
        >
          <button
            type="button"
            (click)="setLang('en')"
            class="px-2.5 py-1.5 rounded-lg text-xs font-semibold transition-all duration-200 min-w-[2.5rem]"
            [class.bg-white]="activeLang() === 'en'"
            [class.dark:bg-surface-700]="activeLang() === 'en'"
            [class.text-primary-700]="activeLang() === 'en'"
            [class.dark:text-primary-300]="activeLang() === 'en'"
            [class.shadow-sm]="activeLang() === 'en'"
            [class.text-surface-500]="activeLang() !== 'en'"
            [class.dark:text-surface-400]="activeLang() !== 'en'"
            [attr.aria-pressed]="activeLang() === 'en'"
          >
            EN
          </button>
          <button
            type="button"
            (click)="setLang('de')"
            class="px-2.5 py-1.5 rounded-lg text-xs font-semibold transition-all duration-200 min-w-[2.5rem]"
            [class.bg-white]="activeLang() === 'de'"
            [class.dark:bg-surface-700]="activeLang() === 'de'"
            [class.text-primary-700]="activeLang() === 'de'"
            [class.dark:text-primary-300]="activeLang() === 'de'"
            [class.shadow-sm]="activeLang() === 'de'"
            [class.text-surface-500]="activeLang() !== 'de'"
            [class.dark:text-surface-400]="activeLang() !== 'de'"
            [attr.aria-pressed]="activeLang() === 'de'"
          >
            DE
          </button>
        </div>

        <button
          (click)="theme.toggle()"
          class="relative p-2.5 rounded-xl bg-surface-100 dark:bg-surface-800 hover:bg-surface-200 dark:hover:bg-surface-700 transition-all duration-300 group"
          [attr.aria-label]="theme.darkMode() ? 'Switch to light mode' : 'Switch to dark mode'"
        >
          @if (theme.darkMode()) {
            <svg class="w-5 h-5 text-accent-400 transition-transform duration-300 group-hover:rotate-45" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
            </svg>
          } @else {
            <svg class="w-5 h-5 text-accent-500 transition-transform duration-300 group-hover:rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
            </svg>
          }
        </button>
      </div>
    </div>
  </div>
</header>
