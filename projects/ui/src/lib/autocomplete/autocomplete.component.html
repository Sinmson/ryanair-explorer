<div class="ui-autocomplete relative">
  <div class="relative">
    <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-surface-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
    </svg>
    <input
      #inputEl
      type="text"
      [value]="query()"
      [placeholder]="placeholder()"
      [disabled]="disabled()"
      (input)="onInput($any($event.target).value)"
      (keydown)="onKeydown($event)"
      (focus)="onInputFocus()"
      (click)="onInputClick()"
      class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-surface-200 dark:border-surface-700 bg-white dark:bg-surface-800 text-surface-900 dark:text-surface-100 placeholder-surface-400 focus:outline-none focus:ring-2 focus:ring-primary-500/50 focus:border-primary-500 transition-colors duration-300 ease-out text-sm disabled:opacity-50 disabled:cursor-not-allowed"
    />
  </div>

  @if (isOpen() && filteredOptions().length > 0) {
    <div
      class="absolute z-50 mt-1 w-full max-h-60 overflow-auto rounded-xl border border-surface-200 dark:border-surface-700 bg-white dark:bg-surface-800 shadow-lg shadow-surface-900/10 dark:shadow-surface-900/30"
    >
      @for (option of filteredOptions(); track option.label; let i = $index) {
        <button
          type="button"
          class="w-full px-4 py-2.5 text-left text-sm transition-colors duration-100"
          [class.bg-primary-50]="i === highlightedIndex()"
          [class.dark:bg-primary-900/30]="i === highlightedIndex()"
          [class.text-surface-400]="option.disabled"
          [class.cursor-not-allowed]="option.disabled"
          [class.hover:bg-surface-50]="i !== highlightedIndex() && !option.disabled"
          [class.dark:hover:bg-surface-700/50]="i !== highlightedIndex() && !option.disabled"
          (click)="selectOption(option)"
          (mouseenter)="onOptionHover(i)"
        >
          {{ option.label }}
        </button>
      }
    </div>
  }
</div>
