@if (tags().length > 0) {
  <div class="flex flex-wrap gap-1.5">
    @for (tag of tags(); track tag.id) {
      <span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-lg bg-primary-100 dark:bg-primary-900/40 text-primary-800 dark:text-primary-200 text-xs font-medium transition-colors duration-300 ease-out animate-in">
        {{ tag.label }}
        @if (removable()) {
          <button
            type="button"
            class="ml-0.5 rounded-full p-0.5 hover:bg-primary-200 dark:hover:bg-primary-800/50 transition-colors"
            (click)="removed.emit(tag)"
          >
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        }
      </span>
    }
  </div>
}
